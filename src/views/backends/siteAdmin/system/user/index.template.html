<div class="app-container site-user-page">
    <el-row :gutter="20">
      <splitpanes :horizontal="this.$store.getters.device === 'mobile'" class="default-theme">
        <!--用户数据-->
        <pane size="84">
          <el-col>
            <el-form
              :model="queryParams"
              ref="queryForm"
              size="small"
              :inline="true"
              v-show="showSearch"
              label-width="68px"
            >
              <el-form-item label="用户名称" prop="userName">
                <el-input
                  v-model="queryParams.userName"
                  placeholder="请输入用户名称"
                  clearable
                  style="width: 240px"
                  @keyup.enter.native="handleQuery"
                />
              </el-form-item>
              <el-form-item label="状态" prop="status">
                <el-select
                  v-model="queryParams.status"
                  placeholder="用户状态"
                  clearable
                  style="width: 240px"
                >
                  <el-option
                    v-for="dict in dict.type.sys_normal_disable"
                    :key="dict.value"
                    :label="dict.label"
                    :value="dict.value"
                  />
                </el-select>
              </el-form-item>
              <el-form-item label="登录方式" prop="isGoogleAuth">
                <el-select
                  v-model="queryParams.isGoogleAuth"
                  placeholder="登录方式"
                  clearable
                  style="width: 240px"
                >
                  <el-option label="账号密码" value="0" />
                  <el-option label="Google验证" value="1" />
                </el-select>
              </el-form-item>
              <el-form-item label="创建时间">
                <el-date-picker
                  v-model="dateRange"
                  style="width: 240px"
                  value-format="yyyy-MM-dd"
                  type="daterange"
                  range-separator="-"
                  start-placeholder="开始日期"
                  end-placeholder="结束日期"
                ></el-date-picker>
              </el-form-item>
              <el-form-item>
                <el-button type="primary" icon="el-icon-search" size="mini" @click="handleQuery"
                  >搜索</el-button
                >
                <el-button icon="el-icon-refresh" size="mini" @click="resetQuery">重置</el-button>
              </el-form-item>
            </el-form>

            <el-row :gutter="10" class="mb8">
              <el-col :span="1.5">
                <el-button
                  type="primary"
                  plain
                  icon="el-icon-plus"
                  size="mini"
                  @click="handleAdd"
                  v-hasPermi="['system:user:add']"
                  >新增</el-button
                >
              </el-col>
              <!--   <el-col :span="1.5">
                <el-button type="success" plain icon="el-icon-edit" size="mini" :disabled="single" @click="handleUpdate" v-hasPermi="['system:user:edit']">修改</el-button>
              </el-col>
              <el-col :span="1.5">
                <el-button type="danger" plain icon="el-icon-delete" size="mini" :disabled="multiple" @click="handleDelete" v-hasPermi="['system:user:remove']">删除</el-button>
              </el-col>
              <el-col :span="1.5">
                <el-button type="info" plain icon="el-icon-upload2" size="mini" @click="handleImport" v-hasPermi="['system:user:import']">导入</el-button>
              </el-col>
              <el-col :span="1.5">
                <el-button type="warning" plain icon="el-icon-download" size="mini" @click="handleExport" v-hasPermi="['system:user:export']">导出</el-button>
              </el-col> -->
              <el-col :span="1.5">
                <el-button
                  type="primary"
                  plain
                  icon="el-icon-setting"
                  size="mini"
                  @click="handleGlobalConfig"
                  v-hasPermi="['system:config:edit']"
                  >全局登录设置</el-button
                >
              </el-col>
              <right-toolbar
                :showSearch.sync="showSearch"
                @queryTable="getList"
                :columns="columns"
              ></right-toolbar>
            </el-row>

            <el-table
              v-loading="loading"
              :data="userList"
              @selection-change="handleSelectionChange"
            >
              <el-table-column type="selection" width="50" align="center" />
              <el-table-column
                label="用户编号"
                align="center"
                key="userId"
                prop="userId"
                v-if="columns.userId.visible"
              />
              <el-table-column
                label="用户名称"
                align="center"
                key="userName"
                prop="userName"
                v-if="columns.userName.visible"
                :show-overflow-tooltip="true"
              />
              <!-- <el-table-column label="用户昵称" align="center" key="nickName" prop="nickName" v-if="columns.nickName.visible" :show-overflow-tooltip="true" /> -->
              <!--  <el-table-column label="登录方式" align="center" key="isGoogleAuth" prop="isGoogleAuth" v-if="columns.isGoogleAuth.visible">
                <template slot-scope="scope">
                  <el-tag :type="scope.row.isGoogleAuth === '1' ? 'success' : 'info'">
                    {{ scope.row.isGoogleAuth === '1' ? 'Google验证' : '账号密码' }}
                  </el-tag>
                </template>
              </el-table-column> -->
              <el-table-column
                label="Google密钥"
                align="center"
                key="googleKey"
                prop="googleKey"
                v-if="columns.googleKey.visible"
                :show-overflow-tooltip="true"
              >
                <template slot-scope="scope">
                  <span v-if="scope.row.googleKey"
                    >{{ scope.row.googleKey.substring(0, 8) }}...</span
                  >
                  <span v-else class="text-muted">未绑定</span>
                </template>
              </el-table-column>
              <el-table-column
                label="状态"
                align="center"
                key="status"
                v-if="columns.status.visible"
              >
                <template slot-scope="scope">
                  <el-switch
                    v-model="scope.row.status"
                    active-value="0"
                    inactive-value="1"
                    @change="handleStatusChange(scope.row)"
                  ></el-switch>
                </template>
              </el-table-column>
              <el-table-column
                label="创建时间"
                align="center"
                prop="createTime"
                v-if="columns.createTime.visible"
                width="160"
              >
                <template slot-scope="scope">
                  <span>{{ parseTime(scope.row.createTime) }}</span>
                </template>
              </el-table-column>
              <el-table-column
                label="操作"
                align="center"
                width="200"
                class-name="small-padding fixed-width"
              >
                <template slot-scope="scope" v-if="scope.row.userId !== 1">
                  <el-button
                    size="mini"
                    type="text"
                    icon="el-icon-edit"
                    @click="handleUpdate(scope.row)"
                    v-hasPermi="['system:user:edit']"
                    >修改</el-button
                  >
                  <el-button
                    size="mini"
                    type="text"
                    icon="el-icon-delete"
                    @click="handleDelete(scope.row)"
                    v-hasPermi="['system:user:remove']"
                    >删除</el-button
                  >
                  <el-dropdown
                    size="mini"
                    @command="(command) => handleCommand(command, scope.row)"
                    v-hasPermi="[
                      'system:user:resetPwd',
                      'system:user:edit',
                      'system:user:googleAuth'
                    ]"
                  >
                    <el-button size="mini" type="text" icon="el-icon-d-arrow-right">更多</el-button>
                    <el-dropdown-menu slot="dropdown">
                      <el-dropdown-item
                        command="handleResetPwd"
                        icon="el-icon-key"
                        v-hasPermi="['system:user:resetPwd']"
                        >重置密码</el-dropdown-item
                      >
                      <el-dropdown-item
                        command="handleAuthRole"
                        icon="el-icon-circle-check"
                        v-hasPermi="['system:user:edit']"
                        >分配角色</el-dropdown-item
                      >
                      <el-dropdown-item
                        command="handleGoogleAuth"
                        icon="el-icon-lock"
                        v-hasPermi="['system:user:googleAuth']"
                        >Google验证</el-dropdown-item
                      >
                    </el-dropdown-menu>
                  </el-dropdown>
                </template>
              </el-table-column>
            </el-table>

            <pagination
              v-show="total > 0"
              :total="total"
              :page.sync="queryParams.pageNum"
              :limit.sync="queryParams.pageSize"
              @pagination="getList"
            />
          </el-col>
        </pane>
      </splitpanes>
    </el-row>

    <!-- 添加或修改用户配置对话框 -->
    <el-dialog :title="title" :visible.sync="open" width="600px" append-to-body>
      <el-form ref="form" :model="form" :rules="rules" label-width="104px">
        <el-row>

            </el-form-item>

          </el-col> -->
        </el-row>
        <el-row>
          <el-col :span="20">
            <el-form-item v-if="form.userId == undefined" label="用户名称" prop="userName">
              <el-input v-model="form.userName" placeholder="请输入用户名称" maxlength="30" />
            </el-form-item>
          </el-col>
          <el-col :span="20">
            <el-form-item v-if="form.userId == undefined" label="用户密码" prop="password">
              <el-input
                v-model="form.password"
                placeholder="请输入用户密码"
                type="password"
                maxlength="20"
                show-password
              />
            </el-form-item>
          </el-col>
        </el-row>
        <el-row>
          <!-- <el-col :span="12">
            <el-form-item label="用户性别">
              <el-select v-model="form.sex" placeholder="请选择性别">
                <el-option v-for="dict in dict.type.sys_user_sex" :key="dict.value" :label="dict.label" :value="dict.value"></el-option>
              </el-select>
            </el-form-item>
          </el-col> -->
          <el-col :span="20">
            <el-form-item label="状态">
              <el-radio-group v-model="form.status">
                <el-radio
                  v-for="dict in dict.type.sys_normal_disable"
                  :key="dict.value"
                  :label="dict.value"
                  >{{ dict.label }}</el-radio
                >
              </el-radio-group>
            </el-form-item>
          </el-col>
        </el-row>
        <el-row>
          <!-- <el-col :span="12">
            <el-form-item label="登录方式">
              <el-radio-group v-model="form.isGoogleAuth">
                <el-radio label="0">账号密码</el-radio>
                <el-radio label="1">Google验证</el-radio>
              </el-radio-group>
            </el-form-item>
          </el-col> -->
          <el-col :span="20">
            <el-form-item label="谷歌验证码秘钥" v-if="form.isGoogleAuth === '1'">
              <el-input
                v-model="form.googleKey"
                placeholder="请输入Google密钥"
                maxlength="64"

              >
                <el-button slot="append" icon="el-icon-refresh" @click="generateGoogleKey"
                  >生成</el-button
                >
              </el-input>
            </el-form-item>
          </el-col>
        </el-row>
        <el-row>
          <!-- <el-col :span="12">

              <el-select v-model="form.postIds" multiple placeholder="请选择岗位">
                <el-option v-for="item in postOptions" :key="item.postId" :label="item.postName" :value="item.postId" :disabled="item.status == 1" ></el-option>

	              <el-select v-model="selectedRoleId" placeholder="请选择角色">

      </el-form>
      <div slot="footer" class="dialog-footer">
        <el-button type="primary" @click="submitForm">确 定</el-button>
        <el-button @click="cancel">取 消</el-button>
      </div>
    </el-dialog>

    <!-- 全局设置对话框 -->
    <el-dialog
      title="全局登录方式设置"
      :visible.sync="globalConfigOpen"
      width="500px"
      append-to-body
    >
      <el-form ref="globalConfigForm" :model="globalConfigForm" label-width="156px">
        <el-form-item label="全局登录方式">
          <el-select v-model="globalConfigForm.isGoogleAuth" placeholder="请选择登录方式">
            <el-option label="账号密码登录" value="0" />
            <el-option label="Google验证码登录" value="1" />
          </el-select>
        </el-form-item>
        <el-form-item label="说明">
          <div style="color: #909399; font-size: 12px; line-height: 1.5">
            <p>• 账号密码登录：用户使用传统的账号密码方式登录</p>
            <p>• Google验证码登录：用户登录时需要输入Google验证器生成的验证码</p>
            <p>• 此设置会影响所有用户的登录验证方式</p>
          </div>
        </el-form-item>
      </el-form>
      <div slot="footer" class="dialog-footer">
        <el-button type="primary" @click="submitGlobalConfig">确 定</el-button>
        <el-button @click="globalConfigOpen = false">取 消</el-button>
      </div>
    </el-dialog>

    <!-- Google验证管理对话框 -->
    <el-dialog :title="googleAuthTitle" :visible.sync="googleAuthOpen" width="600px" append-to-body>
      <el-form ref="googleAuthForm" :model="googleAuthForm" label-width="130px">
        <el-form-item label="当前用户">
          <el-input v-model="googleAuthForm.userName" :disabled="true" />
        </el-form-item>
        <!-- <el-form-item label="启用Google验证">
          <el-radio-group v-model="googleAuthForm.isGoogleAuth" @change="handleGoogleAuthChange">
            <el-radio label="0">禁用</el-radio>
            <el-radio label="1">启用</el-radio>
          </el-radio-group>
        </el-form-item> -->

        <!-- Google验证设置区域 -->
        <div v-if="googleAuthForm.isGoogleAuth === '1'">
          <el-form-item label="Google密钥">
            <el-input
              v-model="googleAuthForm.googleKey"
              placeholder="点击生成按钮获取密钥"
              readonly
              style="width: 300px"
            >
              <el-button
                slot="append"
                icon="el-icon-refresh"
                @click="generateGoogleKeyForUser"
                :loading="generatingKey"
                >生成</el-button
              >
            </el-input>
            <el-button
              type="text"
              @click="copySecretKey"
              style="margin-left: 10px"
              v-if="googleAuthForm.googleKey"
              >复制密钥</el-button
            >
          </el-form-item>

          <!-- 修复这里的条件判断 -->
          <el-form-item
            label="验证二维码"
            v-if="
              googleAuthForm.isGoogleAuth === '1' &&
              googleAuthForm.googleKey &&
              qrCodeData &&
              qrCodeData.qrCodeText
            "
          >
            <div class="qrcode-container">
              <vue-qr
                :text="qrCodeData.qrCodeText"
                :size="200"
                :margin="10"
                colorDark="#000000"
                colorLight="#FFFFFF"
              ></vue-qr>
              <p class="qrcode-tip">
                使用Google Authenticator扫描此二维码<br />
                或手动输入密钥: {{ googleAuthForm.googleKey }}
              </p>
            </div>
          </el-form-item>

          <el-form-item label="测试验证码">
            <el-input
              v-model="testCode"
              placeholder="请输入6位验证码"
              style="width: 200px"
              maxlength="6"
              @keyup.enter.native="testGoogleCode"
            ></el-input>
            <el-button
              type="primary"
              @click="testGoogleCode"
              style="margin-left: 10px"
              :loading="testingCode"
              >测试验证</el-button
            >
          </el-form-item>
        </div>
      </el-form>
      <div slot="footer" class="dialog-footer">
        <el-button type="primary" @click="submitGoogleAuth" :disabled="!isGoogleAuthValid"
          >确 定</el-button
        >
        <el-button @click="googleAuthOpen = false">取 消</el-button>
      </div>
    </el-dialog>

    <!-- 用户导入对话框 -->
    <el-dialog :title="upload.title" :visible.sync="upload.open" width="400px" append-to-body>
      <el-upload
        ref="upload"
        :limit="1"
        accept=".xlsx, .xls"
        :headers="upload.headers"
        :action="upload.url + '?updateSupport=' + upload.updateSupport"
        :disabled="upload.isUploading"
        :on-progress="handleFileUploadProgress"
        :on-success="handleFileSuccess"
        :auto-upload="false"
        drag
      >
        <i class="el-icon-upload"></i>
        <div class="el-upload__text">将文件拖到此处，或<em>点击上传</em></div>
        <div class="el-upload__tip text-center" slot="tip">
          <div class="el-upload__tip" slot="tip">
            <el-checkbox v-model="upload.updateSupport" />是否更新已经存在的用户数据
          </div>
          <span>仅允许导入xls、xlsx格式文件。</span>
          <el-link
            type="primary"
            :underline="false"
            style="font-size: 12px; vertical-align: baseline"
            @click="importTemplate"
            >下载模板</el-link
          >
        </div>
      </el-upload>
      <div slot="footer" class="dialog-footer">
        <el-button type="primary" @click="submitFileForm">确 定</el-button>
        <el-button @click="upload.open = false">取 消</el-button>
      </div>
    </el-dialog>
  </div>
