<div class="app-container">
  <div class="agent-page-header">
    <div class="agent-page-title">代理管理</div>
    <div class="agent-page-summary">
      <div class="agent-page-count">
        数量
        <span class="agent-page-count__value">{{ total }}</span>
      </div>
    </div>
  </div>

  <el-form :model="queryParams" ref="queryForm" :inline="true" label-width="80px">
    <el-form-item label="代理账号" prop="name">
      <el-input
        v-model="queryParams.name"
        placeholder="请输入代理账号"
        clearable
        @keyup.enter.native="handleQuery"
      />
    </el-form-item>
    <el-form-item label="站点编码" prop="siteCode">
      <el-select v-model="queryParams.siteCode" placeholder="请选择站点" clearable style="width: 200px">
        <el-option
          v-for="site in siteOptions"
          :key="site.code"
          :label="site.code + ' - ' + site.nameZn"
          :value="site.code"
        />
      </el-select>
    </el-form-item>
    <el-form-item label="代理状态" prop="agentStatus">
      <el-select v-model="queryParams.agentStatus" placeholder="代理状态" clearable>
        <el-option label="正常" :value="1" />
        <el-option label="停用" :value="0" />
      </el-select>
    </el-form-item>
    <el-form-item label="代理注册时间" label-width="110px">
      <el-date-picker
        v-model="dateRange"
        type="daterange"
        range-separator="至"
        start-placeholder="开始日期"
        end-placeholder="结束日期"
        value-format="yyyy-MM-dd"
      />
    </el-form-item>
    <el-form-item>
      <el-button type="primary" icon="el-icon-search" @click="handleQuery">搜索</el-button>
      <el-button icon="el-icon-refresh" @click="resetQuery">重置</el-button>
    </el-form-item>
  </el-form>

  <el-row :gutter="10" class="mb8">
    <el-col :span="1.5">
      <el-button
        type="primary"
        icon="el-icon-plus"
        @click="handleAdd"
        v-hasPermi="['member:agent:add']"
      >新增代理</el-button>
    </el-col>
    <el-col :span="1.5">
      <el-button
        type="success"
        icon="el-icon-edit"
        :disabled="single"
        @click="handleUpdate"
        v-hasPermi="['member:agent:edit']"
      >修改</el-button>
    </el-col>
    <el-col :span="1.5">
      <el-button
        type="warning"
        icon="el-icon-lock"
        :disabled="single"
        @click="handleResetPwd"
        v-hasPermi="['member:agent:resetPwd']"
      >修改密码</el-button>
    </el-col>
    <el-col :span="1.5">
      <el-button
        type="info"
        icon="el-icon-download"
        :loading="exportLoading"
        @click="handleExport"
        v-hasPermi="['member:agent:export']"
      >导出</el-button>
    </el-col>
  </el-row>

  <el-table v-loading="loading" :data="agentList" @selection-change="handleSelectionChange">
    <el-table-column type="selection" width="55" align="center" />
    <el-table-column label="代理ID" align="center" prop="id" />
    <el-table-column label="代理账号" align="center" prop="name" />
    <el-table-column label="代理注册时间" align="center" prop="regTime" width="180">
      <template slot-scope="scope">
        <span>{{ parseTime(scope.row.regTime, '{y}-{m}-{d} {h}:{i}:{s}') }}</span>
      </template>
    </el-table-column>
    <el-table-column label="代理模型" align="center" width="140">
      <template slot-scope="scope">
        <el-tag :type="getAgentModeType(scope.row)">{{ getAgentModeLabel(scope.row) }}</el-tag>
      </template>
    </el-table-column>
    <el-table-column label="星级级别" align="center" prop="starLevel">
      <template slot-scope="scope">
        <span v-if="isStarAgent(scope.row)">
          {{ formatStarLevel(scope.row.starLevel) }}
        </span>
        <span v-else>-</span>
      </template>
    </el-table-column>
    <el-table-column label="层级级别" align="center" prop="agentLevel">
      <template slot-scope="scope">
        <span v-if="isMultiAgent(scope.row)">
          {{ formatAgentLevel(scope.row.agentLevel) }}
        </span>
        <span v-else>-</span>
      </template>
    </el-table-column>
    <el-table-column label="站点编码" align="center" prop="siteCode">
      <template slot-scope="scope">
        <span>{{ scope.row.siteCode }}</span>
        <el-tag v-if="getSiteName(scope.row.siteCode)" size="mini" type="info" style="margin-left: 5px;">
          {{ getSiteName(scope.row.siteCode) }}
        </el-tag>
      </template>
    </el-table-column>
    <el-table-column label="上级代理" align="center" prop="parentAgentName">
      <template slot-scope="scope">
        <span>{{ scope.row.parentAgentName || '-' }}</span>
      </template>
    </el-table-column>
    <el-table-column label="代理状态" align="center" prop="agentStatus">
      <template slot-scope="scope">
        <el-tag :type="scope.row.agentStatus === 1 ? 'success' : 'danger'">
          {{ scope.row.agentStatus === 1 ? '正常' : '停用' }}
        </el-tag>
      </template>
    </el-table-column>
    <el-table-column label="下属代理" align="center" prop="subAgentCount" />
    <el-table-column label="下属会员" align="center" prop="subMemberCount" />
    <el-table-column label="佣金方案" align="center" prop="commissionPlanName">
      <template slot-scope="scope">
        <span>{{ scope.row.commissionPlanName || '未设置' }}</span>
      </template>
    </el-table-column>
    <el-table-column label="代理返佣比例" align="center" prop="commissionRate">
      <template slot-scope="scope">
        <span>{{ formatCommissionRatePercent(scope.row.commissionRate) }}</span>
      </template>
    </el-table-column>
    <el-table-column label="代理钱包余额" align="center" prop="centerBalanceCnySum" width="130">
      <template slot-scope="scope">
        <span>{{ formatWalletBalance(scope.row.centerBalanceCnySum) }}</span>
      </template>
    </el-table-column>
    <el-table-column label="最后登录" align="center" prop="lastLoginTime" width="180">
      <template slot-scope="scope">
        <span>{{ parseTime(scope.row.lastLoginTime, '{y}-{m}-{d} {h}:{i}') }}</span>
      </template>
    </el-table-column>
    <el-table-column label="操作" align="center" class-name="small-padding fixed-width" width="220">
      <template slot-scope="scope">
        <el-button
          size="mini"
          type="text"
          icon="el-icon-edit"
          @click="handleUpdate(scope.row)"
          v-hasPermi="['member:agent:edit']"
        >修改</el-button>
        <el-button
          size="mini"
          type="text"
          icon="el-icon-lock"
          @click="handleResetPwd(scope.row)"
          v-hasPermi="['member:agent:resetPwd']"
        >修改密码</el-button>
      </template>
    </el-table-column>
  </el-table>

  <pagination
    v-show="total > 0"
    :total="Number(total)"
    :page.sync="queryParams.pageNum"
    :limit.sync="queryParams.pageSize"
    @pagination="getList"
  />

  <el-dialog :title="title" :visible.sync="open" width="760px" append-to-body @close="cancel">
    <el-form ref="form" :model="form" :rules="rules" label-width="110px">
      <el-form-item label="代理账号" prop="name">
        <el-input v-model="form.name" placeholder="请输入代理账号" :disabled="!!form.id" />
      </el-form-item>

      <el-form-item v-if="!form.id" label="密码" prop="password">
        <el-input v-model="form.password" placeholder="请输入密码" type="password" show-password />
      </el-form-item>

      <el-form-item label="站点编码" prop="siteCode">
        <el-select
          v-model="form.siteCode"
          placeholder="请选择站点"
          style="width: 100%"
          clearable
          filterable
          :disabled="!!form.id"
          @change="handleSiteChange"
        >
          <el-option
            v-for="site in siteOptions"
            :key="site.code"
            :label="site.code + ' - ' + site.nameZn"
            :value="site.code"
          />
        </el-select>
      </el-form-item>

      <el-form-item label="佣金方案" prop="commissionPlanId">
        <el-select
          v-model="form.commissionPlanId"
          placeholder="请选择佣金方案"
          style="width: 100%"
          clearable
          filterable
          @change="handleCommissionPlanChange"
        >
          <el-option
            v-for="plan in commissionOptions"
            :key="plan.id"
            :label="plan.planName + '（' + plan.commTypeName + '）'"
            :value="plan.id"
          />
        </el-select>
      </el-form-item>

      <el-form-item v-if="isMultiModel" label="层级级别" prop="agentLevel">
        <el-select
          v-model="form.agentLevel"
          placeholder="请选择层级级别"
          style="width: 100%"
          :disabled="form.id && isOriginalMultiModel"
        >
          <el-option v-for="level in multiLevelOptions" :key="level" :label="level + '层代理'" :value="level" />
        </el-select>
      </el-form-item>

      <el-form-item v-if="isStarModel" label="星级级别" prop="starLevel">
        <el-select v-model="form.starLevel" placeholder="请选择星级级别" style="width: 100%">
          <el-option
            v-for="level in starLevelOptions"
            :key="level"
            :label="level + '星代理'"
            :value="level"
          />
        </el-select>
      </el-form-item>

      <el-form-item v-if="showCommissionRate" label="返佣比例">
        <span>{{ currentCommissionRateText }}</span>
        <span v-if="isMultiModel && currentSiteProfitShareRate !== null" class="rate-limit-tip">
          站点上限：{{ currentSiteProfitShareRateText }}，代理返佣必须低于站点返佣
        </span>
        <span v-if="isMultiModel && currentMultiLevelRateInvalid" class="rate-limit-error">
          当前层级已超过站点上限
        </span>
      </el-form-item>

      <el-form-item class="operation-expense-bear" prop="bearAllOperationExpense">
        <template slot="label">承担全部运营费</template>
        <el-radio-group v-model="form.bearAllOperationExpense" @change="handleBearAllOperationExpenseChange">
          <el-radio :label="1">是</el-radio>
          <el-radio :label="0">否</el-radio>
        </el-radio-group>
        <div class="operation-expense-hint">仅对直属会员有效</div>
        <el-checkbox-group
          v-if="form.bearAllOperationExpense === 1"
          v-model="form.bearOperationExpenseTypes"
          class="operation-expense-types"
        >
          <el-checkbox
            v-for="item in operationExpenseTypeOptions"
            :key="item.value"
            :label="item.value"
            border
          >
            {{ item.label }}
          </el-checkbox>
        </el-checkbox-group>
      </el-form-item>

      <el-form-item v-if="isMultiModel" label="上级代理" prop="agentCode">
        <el-select
          v-model="form.agentCode"
          placeholder="可选，留空表示顶级代理"
          clearable
          filterable
          style="width: 100%"
          :disabled="form.id && isOriginalMultiModel"
        >
          <el-option
            v-for="agent in multiLevelParentOptions"
            :key="agent.id"
            :label="agent.name + '（' + formatParentAgentLevel(agent.agentLevel) + '）'"
            :value="agent.id"
          />
        </el-select>
      </el-form-item>

      <el-form-item label="代理状态" prop="agentStatus">
        <el-radio-group v-model="form.agentStatus">
          <el-radio :label="1">正常</el-radio>
          <el-radio :label="0">停用</el-radio>
        </el-radio-group>
      </el-form-item>

      <el-form-item label="代理备注" prop="agentRemark">
        <el-input v-model="form.agentRemark" type="textarea" placeholder="请输入代理备注" :rows="3" />
      </el-form-item>
    </el-form>
    <div slot="footer" class="dialog-footer">
      <el-button type="primary" :loading="submitLoading" @click="submitForm">确 定</el-button>
      <el-button :disabled="submitLoading" @click="cancel">取 消</el-button>
    </div>
  </el-dialog>

  <el-dialog title="修改密码" :visible.sync="resetPwdOpen" width="500px" append-to-body>
    <el-form ref="resetPwdForm" :model="resetPwdForm" :rules="resetPwdRules" label-width="100px">
      <el-form-item label="代理账号">
        <el-input v-model="resetPwdForm.name" disabled />
      </el-form-item>
      <el-form-item label="新密码" prop="newPassword">
        <el-input v-model="resetPwdForm.newPassword" type="password" placeholder="请输入新密码" show-password />
      </el-form-item>
      <el-form-item label="确认密码" prop="confirmPassword">
        <el-input v-model="resetPwdForm.confirmPassword" type="password" placeholder="请确认新密码" show-password />
      </el-form-item>
    </el-form>
    <div slot="footer" class="dialog-footer">
      <el-button type="primary" @click="submitResetPwd">确 定</el-button>
      <el-button @click="resetPwdOpen = false">取 消</el-button>
    </div>
  </el-dialog>
</div>
